<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register / Login - Vatsal's Learning Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Vatsal's Learning Hub</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </div>
    </nav>

    <!-- Auth Container -->
    <div class="auth-page">
        <div class="container">
            <div class="auth-form-container">
                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="tab-button active" onclick="showRegister()">Register</button>
                    <button class="tab-button" onclick="showLogin()">Login</button>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="form-section">
                    <h2>Create Account</h2>
                    <form id="registerUserForm" onsubmit="validateRegister(event)">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="regName" placeholder="Enter your name" required>
                            <span class="error" id="regNameError"></span>
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="regEmail" placeholder="Enter your email" required>
                            <span class="error" id="regEmailError"></span>
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="regPassword" placeholder="Enter password" required>
                            <span class="error" id="regPasswordError"></span>
                            <small>Min 8 characters, 1 uppercase, 1 number</small>
                        </div>

                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" id="regConfirm" placeholder="Confirm password" required>
                            <span class="error" id="regConfirmError"></span>
                        </div>

                        <button type="submit" class="btn-submit">Create Account</button>
                        <p id="registerSuccess" class="success-message" aria-live="polite"></p>
                    </form>
                </div>

                <!-- Login Form -->
                <div id="loginForm" class="form-section" style="display: none;">
                    <h2>Login</h2>
                    <form id="loginUserForm" onsubmit="validateLogin(event)">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="loginEmail" placeholder="Enter your email" required>
                            <span class="error" id="loginEmailError"></span>
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter password" required>
                            <span class="error" id="loginPasswordError"></span>
                        </div>

                        <button type="submit" class="btn-submit">Login</button>
                        <p id="loginSuccess" class="success-message" aria-live="polite"></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Email: hello@vatsalslearninghub.com</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
